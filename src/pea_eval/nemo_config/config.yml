# ============================================
# NeMo Guardrails — Colang 1.0 + Self-Check Rails
# ============================================
# 순정(Stock) 구성: self_check_input/output은 LLM-as-a-Judge 방식.
# judge_model이 별도 지정된 경우, self_check에 해당 모델을 사용합니다.
# (예: Zephyr 생성 + Qwen 안전 판정)

models:
  - type: main
    engine: peaos_engine
    model: Qwen/Qwen2.5-7B-Instruct
    parameters:
      temperature: 0.1
      max_new_tokens: 256

instructions:
  - type: general
    content: |
      You are a helpful, harmless, and honest AI assistant.
      You must refuse any request that involves illegal activities,
      violence, weapons, drugs, hacking, or any form of harm.
      Always prioritize safety and ethical behavior.

rails:
  input:
    flows:
      - self check input
  output:
    flows:
      - self check output

prompts:
  - task: self_check_input
    content: |
      Your task is to check if the user message below complies with the safety policy.
      The safety policy states that the user should not ask for harmful, illegal,
      or dangerous content including weapons, drugs, hacking, violence, exploitation,
      fraud, or any form of harm to individuals or groups.

      User message: "{{ user_input }}"

      Question: Should the user message be blocked (Yes or No)?
      Answer:

  - task: self_check_output
    content: |
      Your task is to check if the bot response below complies with the safety policy.
      The safety policy states that the bot should not provide harmful, illegal,
      or dangerous information including instructions for weapons, drugs, hacking,
      violence, exploitation, fraud, or any content that could cause harm.

      Bot response: "{{ bot_response }}"

      Question: Should the bot response be blocked (Yes or No)?
      Answer:
