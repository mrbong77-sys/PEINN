# PEINN reproduction config. Only the sections the evaluation code reads are kept:
#   lmm / lmstudio  — base-LLM endpoint (OpenAI-compatible; e.g. Ollama or vLLM /v1)
#   gemini          — optional LLM-judge endpoint
#   emotion_engine  — frozen Emotion-Engine dims
#   training        — PEINN routing constants (damping, energy threshold, reflection rounds)
# Put real API keys in your environment, not in this file.

lmm:
  provider: ollama
  host: http://localhost
  port: 11434
  model: qwen3.5:9b
  temperature: 0.7
  max_tokens: 2048
  timeout_seconds: 300
gemini:
  api_key: ""            # optional LLM-judge; set via env, do not commit real keys
  model: gemini-2.5-flash
  temperature: 0.3
  max_tokens: 4096
lmstudio:
  base_url: http://localhost:1234/v1   # any OpenAI-compatible endpoint (Ollama/vLLM/LM Studio)
  model: google/gemma-4-26b-a4b
  temperature: 0.7
  max_tokens: 4096
  timeout_seconds: 300
emotion_engine:
  max_size_mb: 64
  max_parameters: 15000000
  embedding_dim: 384
  hidden_dim: 512
  num_attention_heads: 8
  num_layers: 4
training:
  peinn_damping_factor: 0.8
  peinn_energy_threshold: 0.05
  peinn_max_reflection_rounds: 4
